                </button>

                <input type="number" name="BPM1" min="80" max="360"  id="BPM1"/>
                <button class="BPM1/2" type="button" id="BPMx2_ch1">
                    x2
                </button>
            </div>

                <label for="Select_mode_1">Select color mode</label>
                <select name="Select_mode_1" id="mode_ch1">

                    <option value="standard">Standard</option>
                    <option value="color_fade">Color fade</option> 
                </select>
            </div>
            <div class="Select_loop_1">   
                <label for="Select_loop_1" >Select loop</label>

                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="4">4</option>
                    <option value="8">8</option>
                    <option value="16">16</option>
                    <option value="32">32</option>
                    <option value="64">loop from cue</option>
                </select>
